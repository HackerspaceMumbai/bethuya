# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

# Bethuya — azd deployment manifest.
# Aspire generates the full Azure infrastructure (Container Apps, Azure SQL,
# Key Vault, etc.) from the AppHost project model.
#
# First-time setup:
#   1. azd auth login
#   2. azd env new production
#   3. azd env set AZURE_LOCATION eastus (or preferred region)
#   4. azd up          # provisions infrastructure + deploys apps
#
# Subsequent deploys:
#   azd deploy         # deploy only (infrastructure already provisioned)
#
# Required GitHub repository secrets (for CI/CD — see .github/workflows/azure-deploy.yml):
#   AZURE_CLIENT_ID      — app registration with federated GitHub OIDC credential
#   AZURE_TENANT_ID      — Azure AD tenant
#   AZURE_SUBSCRIPTION_ID
#
# Required GitHub repository variables:
#   AZURE_ENV_NAME       — e.g. "production"
#   AZURE_LOCATION       — e.g. "eastus"
#
# App runtime secrets are seeded and rotated directly in Azure Key Vault.
# They are intentionally not passed through AZD manifests or workflow YAML.

name: bethuya

services:
  app:
    language: dotnet
    project: AppHost/AppHost/AppHost.csproj
    host: containerapp

hooks:
  # After every deploy, start the migration job to apply any pending EF Core migrations.
  # The job runs MigrateAsync (idempotent) and exits with code 0 when done.
  # ACA does not restart Container App Jobs on successful completion.
  postdeploy:
    posix:
      shell: sh
      run: az containerapp job start --name migration-service --resource-group $AZURE_RESOURCE_GROUP
    windows:
      shell: pwsh
      run: az containerapp job start --name migration-service --resource-group $Env:AZURE_RESOURCE_GROUP
