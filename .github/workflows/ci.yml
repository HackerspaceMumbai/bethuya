name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test (TUnit)
        run: dotnet test --project tests/Hackmum.Bethuya.Tests/Hackmum.Bethuya.Tests.csproj --no-build --configuration Release
        continue-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
          retention-days: 7
          if-no-files-found: ignore

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Install Playwright browsers
        run: pwsh tests/Hackmum.Bethuya.E2E/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Start web app
        run: |
          dotnet run --project src/Bethuya.Hybrid/Bethuya.Hybrid.Web/Bethuya.Hybrid.Web.csproj \
            --no-build --configuration Release \
            --urls http://localhost:5095 &
          echo $! > /tmp/webapp.pid

      - name: Wait for web app
        run: |
          echo "Waiting for web app on http://localhost:5095..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5095 > /dev/null 2>&1; then
              echo "Web app is ready."
              exit 0
            fi
            echo "Attempt $i/30 — retrying in 2s..."
            sleep 2
          done
          echo "Web app did not start in time." && exit 1

      - name: Run E2E tests
        env:
          BETHUYA_BASE_URL: http://localhost:5095
        run: dotnet test --project tests/Hackmum.Bethuya.E2E/Hackmum.Bethuya.E2E.csproj --no-build --configuration Release

      - name: Stop web app
        if: always()
        run: |
          if [ -f /tmp/webapp.pid ]; then
            kill $(cat /tmp/webapp.pid) || true
          fi

      - name: Upload E2E results and traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: TestResults/E2E/
          retention-days: 14
